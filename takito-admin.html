<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة تاكيتو | Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--or:#E85A1A;--ord:#C44810;--bg:#F0EBE4;--wh:#fff;--tx:#1A1208;--mu:#8A7A6A;--gr:#25D366;--red:#E53935;--green:#2E7D32;--gbg:#E8F5E9}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── LOGIN SCREEN ── */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#1A1208 0%,#3D2010 100%)}
.login-box{background:var(--wh);border-radius:28px;padding:36px 28px 28px;width:min(100%,360px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{width:70px;height:70px;border-radius:18px;object-fit:cover;margin-bottom:16px;box-shadow:0 8px 24px rgba(232,90,26,.35)}
.login-title{font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;color:var(--tx);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--mu);font-weight:600;margin-bottom:28px}
.login-field{text-align:right;margin-bottom:14px}
.login-field label{display:block;font-weight:700;font-size:13px;color:var(--tx);margin-bottom:6px}
.login-inp{width:100%;background:#F6F1EC;border:2px solid transparent;border-radius:14px;padding:13px 16px;font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;color:var(--tx);outline:none;transition:border-color .2s;direction:ltr;text-align:center;letter-spacing:2px}
.login-inp:focus{border-color:var(--or);background:#FFF5EF}
.login-inp.err{border-color:var(--red);animation:shake .3s ease}
.login-err{color:var(--red);font-size:12px;font-weight:700;margin-top:6px;min-height:18px;text-align:center}
.login-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:14px;padding:15px;font-family:'Cairo',sans-serif;font-weight:900;font-size:17px;cursor:pointer;margin-top:6px;box-shadow:0 6px 20px rgba(232,90,26,.4);transition:all .2s}
.login-btn:hover{background:var(--ord);transform:translateY(-1px)}
.login-btn:active{transform:scale(.98)}
.login-hint{margin-top:20px;font-size:11px;color:var(--mu);font-weight:600;line-height:1.6}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}

/* ── ADMIN PANEL ── */
#adminPanel{display:none}
.ap-header{background:var(--tx);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.3)}
.ap-hd-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
.ap-logo{display:flex;align-items:center;gap:10px}
.ap-logo img{width:36px;height:36px;border-radius:10px;object-fit:cover}
.ap-logo-txt{display:flex;flex-direction:column;line-height:1.1}
.ap-logo-en{font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:1px}
.ap-logo-tag{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;background:rgba(255,255,255,.12);padding:2px 8px;border-radius:20px}
.logout-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);border-radius:20px;padding:6px 14px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,.2)}

.ap-body{max-width:600px;margin:0 auto;padding:20px 16px 60px}

/* Stats bar */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--wh);border-radius:16px;padding:14px 12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.stat-num{font-family:'Poppins',sans-serif;font-weight:900;font-size:24px;color:var(--or)}
.stat-lbl{font-size:11px;color:var(--mu);font-weight:700}

/* Section */
.ap-sec{background:var(--wh);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.ap-sec-t{font-weight:900;font-size:15px;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:7px;border-bottom:2px solid #F5F0EB;padding-bottom:10px}
.ap-sec-t span{color:var(--or)}

/* Item row */
.ai-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #F5F0EB;transition:background .2s}
.ai-row:last-child{border-bottom:none}
.ai-thumb{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0;background:#F5F0EB}
.ai-thumb-em{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,#FDEBD6,#F8D5B8);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ai-inf{flex:1;min-width:0}
.ai-nm{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-meta{font-size:11px;color:var(--mu);font-weight:600;margin-top:2px}
.ai-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.av-toggle{border:none;border-radius:20px;padding:6px 11px;font-family:'Cairo',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.av-toggle.on{background:#E8F5E9;color:var(--green);border:1.5px solid rgba(46,125,50,.25)}
.av-toggle.off{background:#FFF3E0;color:#BF360C;border:1.5px solid rgba(191,54,12,.25)}
.del-btn{background:#FFF5F5;border:1.5px solid rgba(229,57,53,.2);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--red);font-size:15px}
.del-btn:hover{background:#FFEBEE;border-color:rgba(229,57,53,.4)}

/* Add form */
.form-grid{display:grid;gap:12px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-weight:700;font-size:13px;color:var(--tx)}
.ff-hint{font-size:11px;color:var(--mu);font-weight:600}
.fi{background:#F6F1EC;border:2px solid transparent;border-radius:12px;padding:11px 13px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--tx);outline:none;width:100%;transition:all .2s;direction:rtl}
.fi:focus{border-color:var(--or);background:#FFF5EF}
.fi::placeholder{color:#C5B8A8;font-size:12px}
.icon-name-row{display:grid;grid-template-columns:60px 1fr;gap:8px}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* Single toggle */
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#F6F1EC;border-radius:12px;cursor:pointer;user-select:none;border:2px solid transparent;transition:all .2s}
.toggle-wrap:hover{background:#FFF5EF}
.toggle-wrap.on{background:#FFF5EF;border-color:rgba(232,90,26,.25)}
.sw-track{width:40px;height:22px;background:#ccc;border-radius:20px;position:relative;transition:background .25s;flex-shrink:0}
.sw-track.on{background:var(--or)}
.sw-thumb{position:absolute;top:3px;right:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sw-track.on .sw-thumb{transform:translateX(-18px)}
.toggle-lbl{font-weight:700;font-size:13px;flex:1}
.toggle-sub{font-size:11px;color:var(--mu);font-weight:600}
/* Submit */
.submit-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:14px;padding:15px;font-family:'Cairo',sans-serif;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(232,90,26,.35);transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{background:var(--ord);transform:translateY(-1px)}
.submit-btn:active{transform:scale(.98)}

/* Confirm */
.conf-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.conf-backdrop.open{display:flex}
.conf-box{background:var(--wh);border-radius:22px;padding:26px 22px;width:min(88%,300px);text-align:center;animation:popIn .25s ease}
.conf-icon{font-size:44px;margin-bottom:10px}
.conf-msg{font-weight:700;font-size:15px;margin-bottom:18px;line-height:1.5;color:var(--tx)}
.conf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.conf-no{background:#F5F0EB;color:var(--mu);border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.conf-yes{background:var(--red);color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-weight:900;font-size:14px;cursor:pointer}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* Toast */
.tst{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(26,18,8,.92);color:#fff;padding:10px 22px;border-radius:50px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fi.err{border-color:var(--red)}
</style>
</head>

const DEFAULT_MENU = [
  {id:1,name:'وجبة ريزو كريسبي',desc:'أرز بسمتي مدخن، مع دجاج مقلي مفرمش وصوص سموكي.',imgKey:'crispy',icon:'🍗',singleSize:false,miniP:15,extraP:20,available:true},
  {id:2,name:'وجبة ريزو كبدة',desc:'أرز بسمتي مدخن، مع كبدة اسكندراني وحذنار طازج وصوص سموكي.',imgKey:'liver',icon:'🥩',singleSize:true,price:30,available:true},
  {id:3,name:'وجبة ريزو مكسيكي',desc:'أرز بسمتي مدخن، مع دجاج فاهيتا مشوي وصوص سموكي.',imgKey:'mexican',icon:'🌮',singleSize:false,miniP:15,extraP:20,available:true},
];

let MENU = [], nextId = 20, isSingle = false, pendingDel = null;

// ── SESSION CHECK ──
function checkSession(){
  const s = sessionStorage.getItem(SESSION_KEY);
  if(s === 'ok') showAdmin();
}

function doLogin(){
  const u = document.getElementById('userInp').value.trim();
  const p = document.getElementById('passInp').value;
  const errEl = document.getElementById('loginErr');
  if(u === CREDENTIALS.user && p === CREDENTIALS.pass){
    sessionStorage.setItem(SESSION_KEY, 'ok');
    errEl.textContent = '';
    showAdmin();
  } else {
    errEl.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
    ['userInp','passInp'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.add('err');
      el.value = '';
      setTimeout(() => el.classList.remove('err'), 600);
    });
    document.getElementById('userInp').focus();
  }
}

function showAdmin(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadMenu(); renderAdminList(); updateStats();
}

function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

// ── MENU DATA ──
function loadMenu(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s){MENU=JSON.parse(s);MENU.forEach(i=>{if(i.id>=nextId)nextId=i.id+1;});}else{MENU=JSON.parse(JSON.stringify(DEFAULT_MENU));saveMenu();}}
  catch(e){MENU=JSON.parse(JSON.stringify(DEFAULT_MENU));saveMenu();}
}
function saveMenu(){localStorage.setItem(STORAGE_KEY,JSON.stringify(MENU));}
function getItem(id){return MENU.find(i=>i.id===id);}

// ── RENDER LIST ──
function thumbHtml(item){
  if(item.imgKey && IMGS[item.imgKey])
    return `<img class="ai-thumb" src="${IMGS[item.imgKey]}" alt="${item.name}">`;
  return `<div class="ai-thumb-em">${item.icon}</div>`;
}
function renderAdminList(){
  const el = document.getElementById('adminList');
  if(!MENU.length){el.innerHTML='<p style="text-align:center;color:var(--mu);padding:20px;font-weight:700">لا توجد أصناف</p>';return;}
  el.innerHTML = MENU.map(item => {
    const meta = item.singleSize ? `${item.price} د.ل — حجم موحد` : `ميني: ${item.miniP} | إكسترا: ${item.extraP} د.ل`;
    const aCls = item.available ? 'on' : 'off';
    const aTxt = item.available ? '✓ متوفر' : '✗ نفد';
    return `<div class="ai-row">
      ${thumbHtml(item)}
      <div class="ai-inf">
        <div class="ai-nm">${item.name}</div>
        <div class="ai-meta">${meta}</div>
      </div>
      <div class="ai-actions">
        <button class="av-toggle ${aCls}" onclick="toggleAvail(${item.id})">${aTxt}</button>
        <button class="del-btn" onclick="askDelete(${item.id})" title="حذف">🗑️</button>
      </div>
    </div>`;
  }).join('');
}
function updateStats(){
  const total = MENU.length;
  const avail = MENU.filter(i=>i.available).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAvail').textContent = avail;
  document.getElementById('statUnavail').textContent = total - avail;
}

// ── TOGGLE AVAILABILITY ──
function toggleAvail(id){
  const item=getItem(id);if(!item)return;
  item.available=!item.available;
  saveMenu();renderAdminList();updateStats();
  toast(item.available ? `✓ ${item.name} — متوفر الآن` : `✗ ${item.name} — محدد كنافد`);
}

// ── DELETE ──
function askDelete(id){
  const item=getItem(id);if(!item)return;
  pendingDel=id;
  document.getElementById('confMsg').innerHTML=`هل تريد حذف<br><strong>"${item.name}"</strong><br>نهائياً؟`;
  document.getElementById('confBd').classList.add('open');
  document.getElementById('confYes').onclick=doDelete;
}
function closeConf(){document.getElementById('confBd').classList.remove('open');pendingDel=null;}
function doDelete(){
  if(!pendingDel)return;
  const item=getItem(pendingDel);
  MENU=MENU.filter(i=>i.id!==pendingDel);
  saveMenu();renderAdminList();updateStats();closeConf();
  toast(`🗑️ تم حذف ${item?item.name:'الصنف'}`);
}

// ── SINGLE TOGGLE ──
function toggleSingle(){
  isSingle=!isSingle;
  const tw=document.getElementById('singleToggle');
  const tr=document.getElementById('swTrack');
  tw.classList.toggle('on',isSingle);tr.classList.toggle('on',isSingle);
  document.getElementById('dualPriceWrap').style.display=isSingle?'none':'block';
  document.getElementById('singlePriceWrap').style.display=isSingle?'block':'none';
}

// ── ADD ITEM ──
function addItem(){
  const icon=(document.getElementById('nIcon').value.trim()||'🍽️');
  const name=document.getElementById('nName').value.trim();
  const desc=document.getElementById('nDesc').value.trim();
  if(!name){markErr('nName');toast('⚠️ أدخل اسم الصنف');return;}
  let newItem;
  if(isSingle){
    const price=parseFloat(document.getElementById('nPrice').value);
    if(!price||price<=0){markErr('nPrice');toast('⚠️ أدخل السعر');return;}
    newItem={id:nextId++,name,desc,icon,imgKey:null,singleSize:true,price,available:true};
  }else{
    const mp=parseFloat(document.getElementById('nMiniP').value);
    const ep=parseFloat(document.getElementById('nExtraP').value);
    if(!mp||mp<=0){markErr('nMiniP');toast('⚠️ أدخل سعر الميني');return;}
    if(!ep||ep<=0){markErr('nExtraP');toast('⚠️ أدخل سعر الإكسترا');return;}
    newItem={id:nextId++,name,desc,icon,imgKey:null,singleSize:false,miniP:mp,extraP:ep,available:true};
  }
  MENU.push(newItem);saveMenu();renderAdminList();updateStats();
  ['nIcon','nName','nDesc','nMiniP','nExtraP','nPrice'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  isSingle=false;
  document.getElementById('singleToggle').classList.remove('on');
  document.getElementById('swTrack').classList.remove('on');
  document.getElementById('dualPriceWrap').style.display='block';
  document.getElementById('singlePriceWrap').style.display='none';
  toast(`✅ تمت إضافة ${newItem.name}`);
}
function markErr(id){const el=document.getElementById(id);if(!el)return;el.classList.add('err');el.focus();setTimeout(()=>el.classList.remove('err'),800);}

// ── TOAST ──
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);}

// INIT
checkSession();
</script>
</body>
</html>
